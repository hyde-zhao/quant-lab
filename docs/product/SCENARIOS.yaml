scenarios:
  - id: SC-CR157-P01
    title: "Build mature admission package from complete research refs"
    type: positive
    priority: P0
    requirement_refs: [REQ-CR157-001, REQ-CR157-003]
    preconditions:
      - "CP2 scope approved before implementation."
      - "Fixture/static mature research refs are available."
    steps:
      - "Provide mature research package ref, validation report ref, runner offline preflight ref, observation plan ref and risk policy ref."
      - "Build mature admission package draft."
      - "Validate package fields and evidence index refs."
    expected:
      - "Package is structurally complete."
      - "Authorization flags remain not_runtime, not_simulation, not_live and not_gateway_or_qmt."
      - "No provider, NAS, credential, QMT, gateway, simulation or trading access occurs."
  - id: SC-CR157-P02
    title: "Stage 2 to Stage 3 handoff is explicit and auditable"
    type: positive
    priority: P0
    requirement_refs: [REQ-CR157-002, REQ-CR157-003]
    preconditions:
      - "Stage 2 framework support and handoff contract are in scope."
    steps:
      - "Inspect handoff fields for inputs, outputs, evidence refs, validation plan and forbidden runtime operations."
      - "Trace handoff to evidence index and component documentation."
    expected:
      - "Handoff distinguishes Stage 2 support, Stage 3 research evidence production and Stage 4 observation review."
      - "No handoff field implies runtime authorization."
  - id: SC-CR157-N01
    title: "Missing P0 evidence fails closed"
    type: negative
    priority: P0
    requirement_refs: [REQ-CR157-001, REQ-CR157-003]
    steps:
      - "Provide a package input without validation report ref or runner offline preflight ref."
      - "Run package validation."
    expected:
      - "Validation blocks package."
      - "Blocked reason is machine-readable."
  - id: SC-CR157-N02
    title: "Runtime or external operation flag fails closed"
    type: negative
    priority: P0
    requirement_refs: [REQ-CR157-004]
    steps:
      - "Set provider_fetch_count, credential_read_count, qmt_call_count, gateway_call_count, simulation_count or trading_count to non-zero."
      - "Run no-runtime guard validation."
    expected:
      - "Validation blocks package or handoff."
      - "No external operation is executed."
  - id: SC-CR157-B01
    title: "Event and ML adapter scope remains backlog"
    type: boundary
    priority: P1
    requirement_refs: [REQ-CR157-006]
    steps:
      - "Review CR157 first-slice Story Map and MVP scope."
      - "Check whether event/ML adapter implementation is included."
    expected:
      - "CR157 first slice excludes event/ML adapter implementation."
      - "Backlog records follow-up adapter candidates."
  - id: SC-CR157-A01
    title: "CP2 approval is required before HLD or Story split"
    type: precheck
    priority: P0
    requirement_refs: [REQ-CR157-007]
    steps:
      - "Attempt to route CR157 to HLD, Story split, LLD or implementation before CP2 approval."
    expected:
      - "Workflow blocks routing and points to CP2 checkpoint."
  - id: SC-CR158-P01
    title: "Unified adapter core accepts event and ML typed extensions"
    type: positive
    priority: P0
    requirement_refs: [REQ-CR158-001, REQ-CR158-002, REQ-CR158-003]
    use_case_refs: [UC-58-CR158]
    preconditions:
      - "CR158 CP2 scope is approved before HLD or Story split."
      - "Fixture/static event refs and fixture/static ML refs are available."
    steps:
      - "Create an event adapter fixture with event source ref, event time ref, alignment policy ref and signal output ref."
      - "Create an ML adapter fixture with training snapshot ref, validation report ref, model artifact ref and prediction signal ref."
      - "Validate both fixtures against shared adapter core plus type-specific extensions."
    expected:
      - "Both adapter fixtures validate through the shared core."
      - "Event-only fields are not required for ML fixtures."
      - "ML-only fields are not required for event fixtures."
      - "No external feed, training, provider, lake, credential, runtime or publish operation occurs."
  - id: SC-CR158-P02
    title: "Adapter evidence index stores refs-only typed extensions"
    type: positive
    priority: P0
    requirement_refs: [REQ-CR158-004]
    use_case_refs: [UC-58-CR158]
    steps:
      - "Build an evidence index entry for event adapter fixture refs."
      - "Build an evidence index entry for ML adapter fixture refs."
      - "Inspect stored fields for report body, event payload body, model binary, transcript or diff body."
    expected:
      - "Evidence index contains typed refs and short metadata only."
      - "Large body copy count is 0."
      - "All event and ML evidence refs are traceable."
  - id: SC-CR158-N01
    title: "Missing adapter P0 refs fail closed"
    type: negative
    priority: P0
    requirement_refs: [REQ-CR158-002, REQ-CR158-003]
    use_case_refs: [UC-58-CR158]
    steps:
      - "Validate an event adapter fixture missing alignment policy ref."
      - "Validate an ML adapter fixture missing validation report ref."
    expected:
      - "Both validations block."
      - "Blocked reasons are machine-readable."
  - id: SC-CR158-N02
    title: "Runtime or external operation counters fail closed"
    type: negative
    priority: P0
    requirement_refs: [REQ-CR158-005]
    use_case_refs: [UC-58-CR158]
    steps:
      - "Set one or more forbidden counters non-zero: event feed, model training, provider fetch, credential read, lake write, registry write, gateway call, trading call, publish or external framework run."
      - "Run CR158 no-runtime guard validation."
    expected:
      - "Validation blocks CR158 adapter readiness."
      - "Forbidden operation count is reported."
      - "No actual external operation is executed."
  - id: SC-CR158-B01
    title: "CP2 approval does not authorize direct implementation"
    type: boundary
    priority: P0
    requirement_refs: [REQ-CR158-006]
    use_case_refs: [UC-58-CR158]
    steps:
      - "After CP2 scope approval, attempt to route CR158 directly to CP6 implementation."
    expected:
      - "Workflow blocks direct implementation and routes to CP3 HLD, CP4 planning and CP5 design batch."
  - id: SC-CR158-A01
    title: "Release wording avoids runtime readiness claims"
    type: precheck
    priority: P1
    requirement_refs: [REQ-CR158-007]
    use_case_refs: [UC-58-CR158]
    steps:
      - "Review CR158 release wording draft for production/runtime/trading/registry claims."
    expected:
      - "Release wording says local/static/fixture adapter readiness only."
      - "Not authorized list includes feed, training, registry, runtime, trading and publish."
  - id: SC-CR160-P01
    title: "Contract-level Stage 4 review completes without readiness overclaim"
    type: positive
    priority: P0
    requirement_refs: [REQ-CR160-001, REQ-CR160-002, REQ-CR160-004]
    use_case_refs: [UC-58-CR160]
    preconditions:
      - "CR160 CP2 selected design-only dual-lane fail-closed route."
      - "A Stage 3 package provides refs only and no runtime authorization."
    steps:
      - "Review ObservationReviewInput fields for admission package ref, research evidence refs and observation plan instance ref."
      - "Classify evidence profile as contract_only."
      - "Apply decision table and authorization boundary."
    expected:
      - "Review can output contract_review_complete or needs_real_data_evidence."
      - "paper_candidate remains false or unavailable."
      - "simulation_ready remains false or unavailable."
      - "No runtime, data access, paper, simulation or live authorization is produced."
  - id: SC-CR160-P02
    title: "Layered checklist traces Stage 1, Stage 2, Stage 3 and cross-cutting evidence"
    type: positive
    priority: P0
    requirement_refs: [REQ-CR160-003, REQ-CR160-007]
    use_case_refs: [UC-58-CR160]
    steps:
      - "Inspect observation review checklist layers."
      - "Map Stage 1 items to PIT, universe, lineage, dataset refs and leakage policy."
      - "Map Stage 2 items to factor methodology, evidence index, typed unavailable and blocked reasons."
      - "Map Stage 3 items to statistical gate, OOS, economic significance, capacity and rerun consistency."
      - "Map cross-cutting items to authorization boundary, operation counters, no-overclaim wording and follow-up routing."
    expected:
      - "All 4 layers are present."
      - "Each layer has at least 5 review items."
      - "Each item uses PASS, NEEDS_REVIEW, FAIL or N/A."
  - id: SC-CR160-N01
    title: "CR155 blocked admission remains fail-closed"
    type: negative
    priority: P0
    requirement_refs: [REQ-CR160-004, REQ-CR160-005, REQ-CR160-006]
    use_case_refs: [UC-58-CR160]
    preconditions:
      - "Existing CR155 evidence is available as an already-produced reference."
      - "CR160 does not execute new lake reads."
    steps:
      - "Classify CR155 admission evidence with package_status FAIL or BLOCKED and paper_candidate false."
      - "Apply CR160 decision table."
      - "Review no-overclaim and authorization wording."
    expected:
      - "Classification is blocked_admission_failed."
      - "rerun_consistency PASS does not promote the artifact."
      - "paper_candidate remains false."
      - "No new real lake read/write or runtime authorization occurs."
  - id: SC-CR160-N02
    title: "Missing observation plan instance fails closed"
    type: negative
    priority: P0
    requirement_refs: [REQ-CR160-001, REQ-CR160-002]
    use_case_refs: [UC-58-CR160]
    steps:
      - "Provide only an observation plan template ref or omit observation_plan_ref."
      - "Attempt Stage 4 observation review classification."
    expected:
      - "Review result is blocked or needs_review."
      - "The missing instance reason is machine-readable."
      - "No Stage 5 handoff authorization is produced."
  - id: SC-CR160-A01
    title: "CP8 approval keeps runtime and data authorization denied"
    type: precheck
    priority: P0
    requirement_refs: [REQ-CR160-006]
    use_case_refs: [UC-58-CR160]
    steps:
      - "Review CP8 Decision Brief, release notes and deploy checklist after CR160 verification."
      - "Search for claims that CP8 approves code implementation, new lake access, paper simulation, live runtime, trading, broker, publish or deployment."
    expected:
      - "All forbidden operations remain explicitly not authorized."
      - "READY_WITH_RISK is described as design/gate contract closure only."
      - "Any Stage 5 or runtime action is routed to a follow-up CR."
  - id: SC-CR160-B01
    title: "Product baseline records DF and BL promotion to CR160"
    type: boundary
    priority: P0
    requirement_refs: [REQ-CR160-007]
    use_case_refs: [UC-58-CR160]
    steps:
      - "Inspect USE-CASES, REQUIREMENTS, SCENARIOS, TEST-MATRIX, MVP-SCOPE and BACKLOG."
      - "Check whether DF-CR157-003 and BL-CR157-003 are preserved and marked promoted to CR160."
      - "Check whether revision records preserve older CR157 and CR158 baselines."
    expected:
      - "6 of 6 product docs contain CR160 baseline entries."
      - "DF-CR157-003 or BL-CR157-003 promotion is traceable."
      - "Older CR157 and CR158 entries remain present."
  - id: SC-CR161-P01
    title: "Seven-object evidence availability is discoverable without computed-proof claim"
    type: positive
    priority: P0
    requirement_refs: [REQ-CR161-001]
    use_case_refs: [UC-58-CR161]
    steps:
      - "Inspect current product and feature baselines for all seven CR161 evidence objects."
      - "Map their C1-C4 coverage, availability semantics, CR151/CR154 integration and follow-up producers."
    expected:
      - "All seven objects are named and traceable."
      - "No object is represented as a completed FDR/PBO/DSR/OOS/TCA/capacity calculation."
  - id: SC-CR161-N01
    title: "Missing mandatory evidence remains typed-unavailable and blocked"
    type: negative
    priority: P0
    requirement_refs: [REQ-CR161-002]
    use_case_refs: [UC-58-CR161]
    steps:
      - "Review wording for missing trial lineage, p-values, fold metrics, cost inputs and capacity inputs."
      - "Attempt to classify the missing mandatory evidence as a pass or soft warning."
    expected:
      - "Missing mandatory evidence is typed_unavailable."
      - "Admission remains blocked and no silent PASS or runtime readiness claim is present."
  - id: SC-CR161-N02
    title: "CR155 remains blocked without reconstructed historical evidence"
    type: negative
    priority: P0
    requirement_refs: [REQ-CR161-003]
    use_case_refs: [UC-58-CR161]
    steps:
      - "Consume CR155 only through already-packaged evidence references."
      - "Review the effect of absent new lineage or fold-level metrics."
    expected:
      - "CR155 remains blocked."
      - "No historical p-values, trials, folds, costs or capacity data is reconstructed."
  - id: SC-CR161-B01
    title: "Contract baseline does not overclaim computation or runtime"
    type: boundary
    priority: P0
    requirement_refs: [REQ-CR161-004]
    use_case_refs: [UC-58-CR161]
    steps:
      - "Search current CR161 baseline wording for computed statistics, economic proof and runtime claims."
    expected:
      - "Current slice is stated as availability contract plus typed-unavailable fail-closed semantics."
      - "Computed evidence and runtime actions remain explicitly out of scope."
  - id: SC-CR162-P01
    title: "Nine promised baseline documents record CR161 correction"
    type: positive
    priority: P0
    requirement_refs: [REQ-CR161-001, REQ-CR161-005]
    use_case_refs: [UC-58-CR161]
    steps:
      - "Inspect six product and three factor-research-loop feature documents."
      - "Verify each includes a CR162 revision record and CR161 traceability content."
      - "Verify CR161 is reframed rather than reopened."
    expected:
      - "9 of 9 target documents are updated incrementally."
      - "FU-CR161-001..006 and FU-CR162-001 remain candidates."
      - "No source, schema, checker or runtime implementation is implied."
  - id: SC-CR163-P01
    title: "Declare experiment family before first candidate trial"
    type: positive
    priority: P0
    requirement_refs: [REQ-CR163-001, REQ-CR163-005]
    use_case_refs: [UC-58-CR163]
    steps: ["Select each frozen P0 producer chain.", "Declare its family before emitting a trial-start event.", "Validate event ordering and producer coverage."]
    expected: ["Both deduplicated producer chains have pre-search declarations.", "Instrumentation mapping is 4/4 across CPI-CR163-001..004.", "No wrapper/hook double count occurs."]
  - id: SC-CR163-P02
    title: "Record trial attempt and selection lineage append-only"
    type: positive
    priority: P0
    requirement_refs: [REQ-CR163-002, REQ-CR163-003]
    use_case_refs: [UC-58-CR163]
    steps: ["Record multiple trials and attempts.", "Record selected and rejected outcomes.", "Recompute lineage and raw count from stable identities."]
    expected: ["Every trial and selection is referentially complete.", "Raw count equals distinct trial identities.", "No terminal event is deleted."]
  - id: SC-CR163-P03
    title: "Seal deterministically and expose lineage as present"
    type: positive
    priority: P0
    requirement_refs: [REQ-CR163-004, REQ-CR163-006, REQ-CR163-007]
    use_case_refs: [UC-58-CR163]
    steps: ["Validate a complete family.", "Seal identical normalized content repeatedly.", "Pass availability/ref/raw count to existing admission consumers."]
    expected: ["Repeated seals produce one deterministic hash.", "ExperimentFamilyManifest is present only after seal, completeness, reference-integrity, count and tamper checks pass.", "C1 raw-lineage input is ready but C1 remains non-computable without statistical inputs/method.", "No parallel admission gate is created."]
  - id: SC-CR163-N01
    title: "Missing pre-search instrumentation fails closed"
    type: negative
    priority: P0
    requirement_refs: [REQ-CR163-001, REQ-CR163-007]
    use_case_refs: [UC-58-CR163]
    steps: ["Emit a trial before family declaration or omit a frozen entrypoint mapping.", "Attempt seal and admission consumption."]
    expected: ["An otherwise valid but uninstrumented path remains typed_unavailable.", "Post-hoc, incomplete or invalid lineage is blocked and cannot be present.", "Blocked reason identifies ordering or inventory gap."]
  - id: SC-CR163-N02
    title: "Duplicate identity with conflicting content fails closed"
    type: negative
    priority: P0
    requirement_refs: [REQ-CR163-002, REQ-CR163-007]
    use_case_refs: [UC-58-CR163]
    steps: ["Append the same event identity twice with different payloads.", "Attempt validation and seal."]
    expected: ["Conflict is blocked.", "Neither payload silently overwrites the other."]
  - id: SC-CR163-B01
    title: "Retry does not increase raw count while a different seed does"
    type: boundary
    priority: P0
    requirement_refs: [REQ-CR163-003]
    use_case_refs: [UC-58-CR163]
    steps: ["Create one trial with three attempts.", "Create a second trial differing only by seed.", "Recompute counts."]
    expected: ["Raw trial count is 2.", "Attempt count is 4.", "Retries and seeds remain distinguishable."]
  - id: SC-CR163-B02
    title: "Effective trial count stays typed unavailable"
    type: boundary
    priority: P0
    requirement_refs: [REQ-CR163-006, REQ-CR163-008]
    use_case_refs: [UC-58-CR163]
    steps: ["Provide complete raw lineage.", "Inspect effective-trial fields and admission claims."]
    expected: ["effective_trial_count is typed_unavailable.", "Effective-trial ref and method are empty.", "C1 is raw-lineage input-ready only and remains non-computable.", "No statistical correction is claimed."]
  - id: SC-CR163-F01
    title: "Failed cancelled and excluded trials remain in lineage"
    type: failure-recovery
    priority: P0
    requirement_refs: [REQ-CR163-002, REQ-CR163-003]
    use_case_refs: [UC-58-CR163]
    steps: ["Create successful, failed, cancelled and excluded trials.", "Select one candidate.", "Seal and recompute raw count."]
    expected: ["All four trial states remain present and counted.", "Selection does not shrink the family."]
  - id: SC-CR163-R01
    title: "Correction supersedes an immutable sealed version"
    type: failure-recovery
    priority: P0
    requirement_refs: [REQ-CR163-004, REQ-CR163-007]
    use_case_refs: [UC-58-CR163]
    steps: ["Seal version 1.", "Append a correction with reason.", "Create version 2 that supersedes version 1."]
    expected: ["Version 1 hash remains verifiable.", "Version 2 links to version 1.", "No in-place mutation occurs."]
  - id: SC-CR163-T01
    title: "Post-seal tamper is detected"
    type: negative
    priority: P0
    requirement_refs: [REQ-CR163-004, REQ-CR163-007]
    use_case_refs: [UC-58-CR163]
    steps: ["Change sealed trial membership or selection content without supersession.", "Recompute hash and validate chain."]
    expected: ["Tamper is detected and blocked.", "Availability is blocked, not present."]
  - id: SC-CR163-A01
    title: "Unauthorized runtime or external operation remains denied"
    type: permission
    priority: P0
    requirement_refs: [REQ-CR163-008]
    use_case_refs: [UC-58-CR163]
    steps: ["Review fixture/static verification counters.", "Set any forbidden operation counter non-zero in a negative fixture."]
    expected: ["Normal fixture counters are all zero.", "Any non-zero forbidden counter blocks.", "No external operation is executed."]
  - id: SC-CR163-G01
    title: "CR155 negative regression remains blocked"
    type: negative-regression
    priority: P0
    requirement_refs: [REQ-CR163-006, REQ-CR163-008]
    use_case_refs: [UC-58-CR163]
    steps: ["Consume existing CR155 evidence refs only.", "Expose CR163 lineage availability contract without reconstructing history.", "Evaluate existing admission path."]
    expected: ["CR155 remains blocked.", "No historical lineage is synthesized.", "No unavailable evidence is promoted to pass."]
  - id: SC-CR164-P01
    title: "Compute all approved method evidence from one complete sealed family"
    type: positive
    priority: P0
    requirement_refs: [REQ-CR164-001, REQ-CR164-002, REQ-CR164-003, REQ-CR164-004]
    use_case_refs: [UC-58-CR164]
    preconditions: ["Trusted CR163 lineage is present and validation-bound.", "All candidate metrics, p-values, aligned returns, splits and DSR moments are finite and sufficient."]
    steps: ["Bind all inputs to one family ref/hash/raw count.", "Produce BH, WRC/SPA, PBO/CSCV and DSR method evidence.", "Validate required fields and provenance."]
    expected: ["Selected-method required-input coverage is 100%.", "All four method evidences retain method/version/parameter/provenance refs.", "No method uses an input from a different family."]
  - id: SC-CR164-P02
    title: "Deterministic evidence projects to existing consumers"
    type: positive
    priority: P0
    requirement_refs: [REQ-CR164-005, REQ-CR164-007]
    use_case_refs: [UC-58-CR164]
    steps: ["Evaluate the same normalized fixture ten times.", "Project method refs to CR151, CR154 Gate 1 and the admission package."]
    expected: ["Ten runs produce one summary hash.", "Existing-consumer projection paths are complete.", "No competing admission gate is created and authorization flags do not change."]
  - id: SC-CR164-N01
    title: "Missing or partial family inputs fail closed per method"
    type: negative
    priority: P0
    requirement_refs: [REQ-CR164-002, REQ-CR164-003, REQ-CR164-004]
    use_case_refs: [UC-58-CR164]
    steps: ["Remove lineage, one candidate p-value, one return path or one split side in separate fixtures.", "Attempt method computation and projection."]
    expected: ["Missing lineage/input is typed_unavailable when not contradictory.", "Partial or inconsistent membership is blocked.", "No present evidence or clean claim is emitted."]
  - id: SC-CR164-N02
    title: "Method disagreement uses conservative no-OR-pass semantics"
    type: negative
    priority: P0
    requirement_refs: [REQ-CR164-001, REQ-CR164-006, REQ-CR164-007]
    use_case_refs: [UC-58-CR164]
    steps: ["Provide BH PASS with PBO FAIL.", "Provide PBO PASS with DSR typed_unavailable.", "Project final claim status."]
    expected: ["BH PASS plus PBO FAIL is not clean PASS.", "A mandatory unavailable/blocked method blocks its claim.", "Individual method results and reason refs remain visible."]
  - id: SC-CR164-B01
    title: "Method sufficiency thresholds are inclusive and fail closed below the floor"
    type: boundary
    priority: P0
    requirement_refs: [REQ-CR164-004]
    use_case_refs: [UC-58-CR164]
    steps: ["Evaluate fixtures exactly at 2 BH/WRC candidates, 4 PBO candidates and 4 valid splits, and DSR 2 trials/sample_length 30.", "Evaluate one-below-threshold variants."]
    expected: ["At-threshold finite non-degenerate fixtures pass sufficiency precheck.", "Every below-threshold fixture is typed_unavailable or blocked.", "No threshold is silently lowered."]
  - id: SC-CR164-B02
    title: "DSR raw-count input never aliases effective trial count"
    type: boundary
    priority: P0
    requirement_refs: [REQ-CR164-008]
    use_case_refs: [UC-58-CR164]
    steps: ["Provide sealed raw trial count and sufficient DSR inputs.", "Inspect DSR input metadata and Gate-1 trial-count projection."]
    expected: ["DSR input declares dsr_input_method=raw_trial_count with lineage provenance.", "effective_trial_count remains typed_unavailable with empty ref/method.", "Claims requiring effective count remain blocked."]
  - id: SC-CR164-F01
    title: "Corrected complete inputs recover without overwriting prior failure evidence"
    type: failure-recovery
    priority: P0
    requirement_refs: [REQ-CR164-002, REQ-CR164-003, REQ-CR164-005]
    use_case_refs: [UC-58-CR164]
    steps: ["Record a blocked result for incomplete input.", "Provide a corrected validation-bound input set.", "Recompute as a new evidence version."]
    expected: ["Prior blocked evidence remains auditable.", "New evidence links corrected provenance.", "Recovery does not mutate or erase the prior result."]
  - id: SC-CR164-T01
    title: "NaN Inf and degenerate numerical inputs fail closed"
    type: negative
    priority: P0
    requirement_refs: [REQ-CR164-004, REQ-CR164-005]
    use_case_refs: [UC-58-CR164]
    steps: ["Inject NaN, Inf, zero variance, probability outside [0,1], negative count and length mismatch fixtures.", "Run static input validation."]
    expected: ["All six negative classes fail closed.", "No non-finite value appears in present evidence.", "Blocked reasons identify the invalid field."]
  - id: SC-CR164-H01
    title: "Family hash count or membership mismatch is blocked"
    type: negative
    priority: P0
    requirement_refs: [REQ-CR164-002, REQ-CR164-005]
    use_case_refs: [UC-58-CR164]
    steps: ["Change family hash, raw count or method candidate membership without a valid supersession.", "Attempt evidence production."]
