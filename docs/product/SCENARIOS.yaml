      - "Attempt Stage 4 observation review classification."
    expected:
      - "Review result is blocked or needs_review."
      - "The missing instance reason is machine-readable."
      - "No Stage 5 handoff authorization is produced."
  - id: SC-CR160-A01
    title: "CP8 approval keeps runtime and data authorization denied"
    type: precheck
    priority: P0
    requirement_refs: [REQ-CR160-006]
    use_case_refs: [UC-58-CR160]
    steps:
