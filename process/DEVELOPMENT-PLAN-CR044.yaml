    - CR044-S01
    - CR044-S02
    - CR044-S03
    - CR044-S04
    - CR044-S05
    - CR044-S06
  implementation_allowed: false
  implementation_allowed_until: "CP5 approved"
authorization_boundary:
  authorized:
    - L1 formal CR orchestration
    - L2 offline engineering design
    - fixture-only planning and future fixture-only implementation after CP5
  not_authorized:
    - credential_read
    - login
    - connect
    - account_query
    - cash_query
    - position_query
    - order_query
    - fill_query
    - order_submit
    - order_cancel
    - simulation_runtime
    - live_runtime
    - provider_fetch
    - lake_write
    - catalog_publish
  fail_closed_rule: "Any L3+ runtime behavior must return blocked / fail-closed unless a later per-run authorization is explicitly approved."
parallel_policy:
  max_parallel_lld: 3
  max_parallel_dev: 1
  max_parallel_qa: 2
  rationale: "LLD may be batched with limited parallelism after CP4; development is conservative because S02-S05 may share engine/broker_adapter.py and CR044 guard tests."
global_file_ownership:
  merge_owners:
    engine/broker_adapter.py: CR044-S02
    tests/test_cr044_goldminer_admission_guard.py: CR044-S02
    process/stories/CR044-S06-runbook-and-no-real-operation-guardrails.md: CR044-S06
  forbidden_paths:
    - .env
    - .env.*
    - data/market_data
    - reports/live
    - reports/simulation_runtime
    - catalog
  forbidden_runtime_import_roots:
    - gm
    - gmtrade
    - requests
    - httpx
    - socket
    - subprocess
    - broker
    - trading
completion_criteria:
  cp4:
    - "Feature Design Matrix covers S01-S06 with required Feature status and lld_policy."
    - "Story cards contain story_id, feature_design_refs, lld_policy, dev_gate, validation_context, acceptance_criteria and implementation_allowed=false until CP5 approved."
    - "Development Plan DAG has no invalid references or cycles."
    - "Files have primary/shared owners and no unresolved write conflict."
    - "CP5 batch scope is explicit and includes all CR044 target Story design evidence."
  cp5_entry:
    - "S01-S05 full LLD and S06 technical-note or upgraded full LLD are generated."
    - "No unanswered blocks_lld=true clarification item exists."
    - "No L3+ runtime authorization is implied by design evidence."
