  implementation_allowed: false
  implementation_allowed_until: CP5 approved
authorization_boundary:
  authorized:
    - L1 formal CR orchestration
    - L2 Windows bridge design
    - L2 skeleton planning
    - fixture-only and static validation planning
  not_authorized:
    - credential_read
    - token_or_account_id_collection
    - windows_bridge_runtime_start
    - goldminer_login
    - goldminer_connect
    - account_query
    - cash_query
    - position_query
    - order_query
    - fill_query
    - order_submit
    - order_cancel
    - simulation_runtime
    - live_runtime
    - provider_fetch
    - lake_write
    - catalog_publish
  fail_closed_rule: Any L3+ runtime behavior must return blocked / fail-closed unless a later per-run authorization is explicitly approved.
parallel_policy:
  max_parallel_lld: 3
  max_parallel_dev: 1
  max_parallel_qa: 2
  rationale: LLD can be batched with limited parallelism after CP4; development is conservative because S02/S04/S05 may share CR045 bridge contract and test files.
global_file_ownership:
  merge_owners:
    engine/goldminer_bridge_contract.py: CR045-S02
    tests/test_cr045_goldminer_bridge_contract.py: CR045-S02
