    tests/test_cr045_goldminer_no_operation_static.py: CR045-S05
    docs/goldminer/CR045-BRIDGE-RUNBOOK.md: CR045-S06
  forbidden_paths:
    - .env
    - .env.*
    - data/market_data
    - reports/live
    - reports/simulation_runtime
    - catalog
  forbidden_runtime_import_roots:
    - gm
    - gmtrade
  forbidden_runtime_actions:
    - login
    - connect
    - account_query
    - cash_query
    - position_query
    - order_query
    - fill_query
    - order_submit
    - order_cancel
    - provider_fetch
    - lake_write
    - catalog_publish
completion_criteria:
  cp4:
    - Feature Design Matrix covers FEAT-CR045-GOLDMINER-BRIDGE and S01-S06 lld_policy.
    - Required Feature DESIGN / TEST-PLAN / TASKS exist.
    - Story cards contain feature_design_refs, lld_policy, dependencies, file owner, dev_gate and not-authorized boundary.
    - Development Plan DAG has no invalid references or cycles.
    - Files have primary/shared owners and no unresolved write conflict.
    - CP4 summary states that it will be folded into CP5 Decision Brief.
  cp5_entry:
    - S01-S05 full LLD and S06 technical-note or upgraded full LLD are generated.
    - No unanswered blocks_lld=true clarification item exists.
    - No L3+ runtime authorization is implied by design evidence.
