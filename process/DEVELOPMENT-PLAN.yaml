parallel_policy:
  max_parallel_lld: 3
  max_parallel_dev: 2
  max_parallel_qa: 2
  cr004_policy: "LLD 可按批次 A(014/015)、B(016/017)、C(018) 滚动确认；开发按 DAG、依赖类型和文件所有权串行为主，真实 adapter 默认关闭。"
  cr005_policy: "历史 LLD 批次 A/B1/B2/C/D 已完成后续 CP5/CP6/CP7 门控；CR005-S01..S06 当前以 Story 卡片和 CP7 检查结果的 verified / PASS 为准。旧 draft-pending-cp4-rerun 口径已 superseded，不再阻塞 CR006-BATCH-A。"
  cr006_policy: "LLD 统一进入 CR006-BATCH-A，覆盖 S01/S02/S03/S04 四张 Story；可按 max_parallel_lld=3 分轮起草，但 CP5 必须等全部 LLD 和自动预检完成后一次性确认。开发默认按 S01 -> S02 -> S03/S04 调度：S01 冻结 Tushare-first 数据层契约，S02 适配轻量 engine，S03 适配 Backtrader clean feed，S04 收敛旧 data reference-only 护栏。S04 对 S02/S03 的计划依赖类型为 contract，可在 S02/S03 LLD 合同与边界术语冻结后收敛，不要求等待 S02/S03 CP6 runtime。任何真实 data/** 读取、列出、迁移、复制、比对或删除均不在默认 dev_ready 范围内，必须用户另行授权。"
  cr007_policy: "LLD 统一进入 CR007-BATCH-A，覆盖 S01/S02/S03/S04/S05 五张 Story；可按 max_parallel_lld=3 分轮起草，但 CP5 必须等全部 LLD 和自动预检完成后一次性确认。开发默认按 S01 -> S02 -> S03 -> S04 -> S05 调度：S01 冻结长期 prices planner，S02 冻结 benchmark/calendar coverage，S03 冻结 dataset readiness，S04 消费真实 benchmark，S05 收敛 legacy quality report 与文档 guardrail。S02/S03 可并行起草 LLD，但因共享 market_data/normalization.py、validation.py、readers.py，默认不得并行开发；除非 CP5 后 LLD 明确拆分文件所有权并由 meta-po 重新判定 file_conflict_free。任何真实 Tushare 抓取、真实 /mnt/ugreen-data-lake 写入、旧 data/** 操作、旧质量报告内容读取或凭据读取均不在默认 dev_ready 范围内。"
  cr008_policy: "LLD 统一进入 CR008-BATCH-A，覆盖 S01/S02/S03/S04/S05/S06 六张 Story；可按 max_parallel_lld=3 分轮起草，但 CP5 必须等全部 LLD 和自动预检完成后一次性确认。开发默认按 S01/S02 合同先行 -> S03 research_dataset_builder -> S04/S05 gates -> S06 auxiliary contract 调度；S04/S05 可并行起草 LLD，但因共享 engine/research_dataset.py 与 gate result 语义默认不得并行开发。CR007-S02 可与 CR008 solution-design 并行离线实现；CR007-S04/S05 在 CR008 CP3/CP4 设计确认前保持 hold。CR008 未完成 CP3/CP4/CP5 前不得实现，任何真实 Tushare 抓取、真实 /mnt/ugreen-data-lake 写入、旧 data/** 操作、旧质量报告内容读取或凭据读取均不在默认 dev_ready 范围内。"
  cr010_policy: "CR010 当前分四个批次：DL-BATCH-A 数据湖基础生产化、DL-BATCH-B W3 fail-fast、QF-BATCH-C 实验消费真实性、OPS-BATCH-D 备份/归档/恢复/保留策略。每批次均需全量 LLD 与 CP5 批次人工确认后才可实现。开发默认离线 / fixture / tmp lake / dry-run；真实联网、真实 MARKET_DATA_LAKE_ROOT 写入、旧 data/** 操作、旧 reports/data_quality_report.csv 内容读取和凭据读取均需用户另行明确授权；OPS-D 的 backup/restore/retention CLI 默认 dry-run，只有 --execute 才允许复制、恢复或删除。"
  cr011_policy: "CR011 分三个批次：DATA-BATCH-A 覆盖 S01..S06 的 benchmark/PIT/tradability/execution/adjustment/exposure 合同；RESEARCH-BATCH-B 覆盖 S07 的 liquidity/capacity/cost sensitivity；VALIDATION-BATCH-C 覆盖 S08 的 factor panel audit 与 robust validation。每批次均需全量 LLD 与 CP5 批次人工确认后才可实现。LLD 可按 max_parallel_lld=3 分轮起草；开发默认按 S01/S02/S03/S05/S06 合同先行 -> S04 -> S07 -> S08。共享 engine/research_dataset.py、market_data/readers.py、experiments/run_experiment_17_21_factor_suite.py 的 Story 默认不得并行开发。不得真实联网、读凭据、写真实 lake、操作旧 data/** 或覆盖旧 reports/experiment_17_21/factor_strategy_report.md。"
  cr013_policy: "CR013 采用单批次 CR013-BATCH-A，覆盖 S01 full-history gap register、S02 execution/VWAP claim boundary、S03 unsupported register/docs refresh、S04 full-history backfill roadmap。LLD 可按 max_parallel_lld=3 分轮起草，但 CP5 必须等四张 LLD 和自动预检全部完成后统一确认。开发默认 S01/S02 合同先行 -> S03 -> S04；S01/S02 可并行起草 LLD，S03/S04 消费其冻结合同。CP5 前不得实现；本轮不授权 provider fetch、真实 lake 写入、凭据读取、旧 data/** 读取或旧报告覆盖。"
  cr014_policy: "CR014 分两批推进：BATCH-A=CR014-FULL-HISTORY-LAKE-BATCH-A 覆盖 S01 universe/lifecycle、S02 Parquet layout/manifest/catalog/publish、S03 P0 plan/run/normalize/validate/publish、S04 DuckDB read-only、S05 full-history readiness/claim、S06 incremental/replay/retention、S07 research consumer/docs boundary、S08 W3/minute/tick/Level2/VWAP blocked boundary；BATCH-B=CR014-REAL-RUN-BATCH-B 覆盖 S09 分时段真实 provider 抓取与 raw/manifest/run metadata 写湖。BATCH-A CP5 只确认 S01..S08 LLD，不授权真实执行。S09 必须等 S01..S08 verified、S09 LLD approved、S09 CP5 approved、用户提供 per-run authorization_id 和 dataset/date/source/lake/window 范围后才可执行。真实写 raw/manifest 不自动 publish current pointer；publish 仍需独立 Explicit Publish Gate 授权。"
  cr015_cr016_cr017_policy: "本增量按 3 个 LLD 批次和 8 个调度 Wave 规划：CR017-BATCH-A 先冻结 raw / adj_factor / qfq / hfq / returns_adjusted 与 single-policy gate；CR015-BATCH-A 建立 QMT foundation 的 environment、adapter、OMS、hard risk、broker lake 和 shadow runbook；CR016-BATCH-A 建立 simulation / live_readonly / small_live / scale_up 的 stage gate、runbook、reconciliation、kill switch 和 incident playbook。LLD 可按 max_parallel_lld=3 分轮写作，CP5 必须等全部目标 Story LLD 与自动预检完成后统一确认。开发默认 CR017 合同先行、CR015 foundation 其次、CR016 later-gated；CR016 的真实 activation、small_live 和 scale_up 不得作为当前可直接实现项。CP5 前不得生成 LLD、不得实现、不得真实 QMT 操作、不得真实抓取、不得真实写湖、不得 publish current pointer、不得改依赖。"
  cr018_policy: "CR018 采用单一 LLD 批次 CR018-PRODUCTION-DATA-LAKE-CLOSURE-BATCH-A，覆盖 S01..S09。CP5 已 approved；后续开发默认 S01 合同先行，S02/S03/S05 聚合 P0 readiness，S04 只阻断 P1 声明，S06/S07 串行收敛 publish/rollback，S08/S09 串行收敛 published truth research rerun 与 QMT admission。CP5 后只允许离线 / fixture / dry-run 代码实现；不得真实 provider fetch、不得写真实 lake、不得 publish current pointer、不得启动 QMT、不得读取凭据。S09 保持 later-gated。"
  cr019_policy: "CR019 采用单一全量 LLD 批次 CR019-STAGE6-QMT-BRIDGE-BATCH-A，覆盖 S01..S10。LLD 可按 max_parallel_lld=3 分轮起草，但 CP5 必须等待 10 张 LLD、LLD clarification queue 和自动预检全部收敛后统一人工确认。开发默认 S01/S02 admission 合同先行，S03/S04 C/S transport 合同并行设计，S05/S06/S07 鉴权、endpoint 和运行门控串行收敛，S08/S09 fallback/deferred 后置，S10 文档 runbook 最后合并。CP5 前不得实现、不得改依赖、不得启动服务、不得读取凭据、不得真实 QMT / MiniQMT / XtQuant 操作、不得 provider fetch、不得写真实 lake 或 broker lake、不得 publish、不得 simulation/live run。完整 endpoint matrix 是目标契约，不代表真实操作授权；pairing/HMAC 只识别调用方，不替代 run mode、stage gate、risk gate、kill-switch 和 per-run authorization。"
  cr025_policy: "CR025 采用单一全量 LLD 批次 CR025-RESEARCH-EXECUTION-SEMANTIC-ALIGNMENT-BATCH-A，覆盖 S01..S06。6 份 LLD 与 6 份 CP5 自动预检已完成且 CP5 人工确认 approved；S01/S04/S02/S03/S05/S06 已 verified；S06 首轮 CP7 因 `QuantConnect LEAN` trace token 缺失失败，已由 blocker fix CP6 和 CP7 复验关闭；CP8 自动预检 PASS，用户于 2026-06-02T23:10:16+08:00 回复“好的关闭CR025”，当前 CR-025 已关闭。开发默认 S01/S04 clean feed 与 no-copy 治理先行，S02 semantic diff 其次，S03 order_intent_draft_v1 与 QMT later-gated handoff 后置，S05/S06 安全验证与文档收敛最后合并。CR-025 关闭只收敛受控离线 / fixture / 静态合同交付；不得改依赖、不得运行 Backtrader、不得复制/裁剪/改写/源码级移植 Backtrader GPLv3 源码、不得触发真实 broker/QMT/MiniQMT/XtQuant/provider/lake/broker lake/publish/simulation/live，不得读取凭据。Backtrader 只作为 lightweight execution engine 的执行语义参考，不作为多因子研究主框架；FactorSpec、FactorRunSpec、IC / RankIC、分层收益、多因子组合、实验追踪和策略准入包已由 CR-030 转为正式 active CR 承接，当前处于 CP2 intake，后续需参考 Qlib / Alphalens / vectorbt / vnpy.alpha 等项目并重验 license / 维护状态 / 适配边界。optional runtime 只能按 optional dependency + lazy import 单独确认；migration_candidate 当前为空。"
  cr030_policy: "CR030 CP3 HLD 已 approved，CP4 Story Plan 自动预检 PASS。CR030 采用单一全量 LLD 批次 CR030-MULTIFACTOR-RESEARCH-LOOP-BATCH-A，覆盖 S01..S08。LLD 可按 max_parallel_lld=3 分轮起草，但 CP5 必须等待 8 张 LLD、LLD clarification queue 和自动预检全部收敛后统一人工确认。开发默认 S01/S02 合同治理先行，S03/S04 面板与评价其次，S05/S06 组合与 manifest/catalog 并行设计，S07 admission / draft handoff 后置，S08 safety/docs 最后合并。CP5 前不得实现、不得改依赖、不得 clone/install/run 外部项目、不得源码迁移、不得 provider fetch、不得写 lake 或 publish、不得触发 QMT / MiniQMT / XtQuant / simulation / live / account / order / cancel，不得读取凭据。CR-026 Qlib runner、optimizer / ML workflow、vectorbt / PyBroker / RQAlpha / vn.py Spike 均保持后置。"
  cr020_policy: "CR020 CP3 HLD 已 approved，CP4 Story Plan 自动预检 PASS。CR020 采用单一全量 LLD 批次 CR020-QMT-GATEWAY-READONLY-BATCH-A，覆盖 S01..S06。LLD 可按 max_parallel_lld=3 基于 Story/file owner 分轮起草，但 CP5 必须等待 6 张 LLD、LLD clarification queue、CP4 摘要和 CP5 自动预检全部收敛后统一人工确认。开发默认 S01 Windows gateway runtime / admission 先行，S02 session ready gate 消费 S01，S03 Linux REST client 与 S04 auth/scope 可在 S01 合同冻结后分轮设计，S05 query_positions 必须等待 S02/S03/S04 合同，S06 docs/runbook/CP7 evidence 最后合并。CP5 前 implementation_allowed=false；不得生成 LLD、不得实现、不得改 pyproject.toml/uv.lock、不得启动 gateway、不得绑定端口、不得连接 QMT/MiniQMT/XtQuant、不得读取/打印/解析真实 .env、不得输出凭据、不得交易/发单/撤单/改单/账户写入、不得 simulation/live、不得 provider fetch/lake write/publish/reports overwrite。CR020 唯一真实只读 endpoint 是 query_positions，scope=qmt:positions:read。"
