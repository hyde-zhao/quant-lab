decision_items:
  - id: DQ-CP3-CR053-01
    type: architecture
    summary: "Use logical NAS root mapping instead of real NAS scan."
  - id: DQ-CP3-CR053-02
    type: implementation
    summary: "Use manifest-first two-phase transfer."
  - id: DQ-CP3-CR053-03
    type: architecture
    summary: "Use 4T RAID as warm archive and 14T HDD as cold backup; hot cache is not durable."
  - id: DQ-CP3-CR053-04
    type: runtime_authorization
    summary: "Real migration happens in CR058 CP6, not CR053."
  - id: DQ-CP3-CR053-05
    type: security
    summary: "Trading PC only consumes read-only package exchange, no full archive mount."

